name: Bundle Size

on:
  pull_request:
    branches: [main]

jobs:
  size:
    name: Check Bundle Size
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Report build output size
        run: |
          echo "## Bundle Size Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -d "apps/web/.output" ]; then
            echo "### Web App" >> $GITHUB_STEP_SUMMARY
            du -sh apps/web/.output/public/** 2>/dev/null | head -20 >> $GITHUB_STEP_SUMMARY || echo "No public output found" >> $GITHUB_STEP_SUMMARY
          fi
